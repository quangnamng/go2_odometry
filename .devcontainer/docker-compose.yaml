version: "3.9"
services:
  go2py-inekf:
    build: .
    network_mode: host
    privileged: true
    command: bash
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ../:/home/ros2_ws/src/go2_odometry
      - /dev/input:/dev/input
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    stdin_open: true
    tty: true